version: '3.9'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: 'Y'
      MSSQL_PID: Developer
      SA_PASSWORD: ${SQLSERVER_PASSWORD}
    ports:
      - '${SQLSERVER_PORT:-1433}:1433'
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - fleetnet

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    networks:
      - fleetnet

  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - fleetnet

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - '5672:5672'
      - '15672:15672'
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - fleetnet

  backend:
    build:
      context: ./backend
    environment:
      HTTP_PORT: ${HTTP_PORT:-3000}
      SQLSERVER_HOST: sqlserver
      SQLSERVER_PORT: 1433
      SQLSERVER_USER: ${SQLSERVER_USER}
      SQLSERVER_PASSWORD: ${SQLSERVER_PASSWORD}
      SQLSERVER_DB: ${SQLSERVER_DB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_TTL_SECONDS: ${REDIS_TTL_SECONDS:-120}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-3600s}
      MONGO_URI: mongodb://mongo:27017/fleetcore
      RABBITMQ_URI: amqp://rabbitmq:5672
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-fleetcore.events}
      RABBITMQ_QUEUE: ${RABBITMQ_QUEUE:-fleetcore.vehicles}
      NODE_ENV: production
      ADMIN_NICKNAME: ${ADMIN_NICKNAME:-aivacol}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-aivacol@fleetcore.local}
      ADMIN_NAME: ${ADMIN_NAME:-Aivacol Admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-aivacol123!}
    ports:
      - '${HTTP_PORT:-3000}:3000'
    depends_on:
      - sqlserver
      - redis
      - mongo
      - rabbitmq
    networks:
      - fleetnet

  frontend:
    build:
      context: ./frontend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://backend:3000/api
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Fleetcore Web}
      NEXT_PUBLIC_CACHE_TTL_SECONDS: ${REDIS_TTL_SECONDS:-120}
    ports:
      - '${FRONTEND_PORT:-3001}:3000'
    depends_on:
      - backend
    networks:
      - fleetnet

networks:
  fleetnet:
    driver: bridge

volumes:
  sqlserver_data:
  redis_data:
  mongo_data:
  rabbitmq_data:
