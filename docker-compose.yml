services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: fleetcore-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "${SQLSERVER_PASSWORD:-YourStrong@Passw0rd}"
    ports:
      - "${SQLSERVER_PORT:-1433}:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks:
      - fleetnet

  # A imagem oficial do SQL Server NAO executa scripts de
  # /docker-entrypoint-initdb.d automaticamente (isso e convencao do
  # Postgres/MySQL). Este job roda o init.sql apos o SQL Server ficar
  # saudavel para criar o banco `fleetcore` que o backend espera. Sem ele
  # o backend conecta num banco inexistente e o erro 4060 aparece
  # mascarado como "Login failed for user 'sa'".
  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: fleetcore-sqlserver-init
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      MSSQL_SA_PASSWORD: "${SQLSERVER_PASSWORD:-YourStrong@Passw0rd}"
    volumes:
      - ./docker/sqlserver:/init:ro
    entrypoint: ["/bin/bash", "-c"]
    command:
      - '/opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P "$${MSSQL_SA_PASSWORD}" -C -b -i /init/init.sql'
    restart: "no"
    networks:
      - fleetnet

  redis:
    image: redis:7-alpine
    container_name: fleetcore-redis
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fleetnet

  mongo:
    image: mongo:7
    container_name: fleetcore-mongo
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - fleetnet

  rabbitmq:
    image: rabbitmq:3-management
    container_name: fleetcore-rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - fleetnet

  backend:
    build:
      context: ./backend
    container_name: fleetcore-backend
    environment:
      NODE_ENV: "production"
      HTTP_PORT: "${HTTP_PORT:-3000}"

      SQLSERVER_HOST: "sqlserver"
      SQLSERVER_PORT: "1433"
      SQLSERVER_USER: "${SQLSERVER_USER:-sa}"
      SQLSERVER_PASSWORD: "${SQLSERVER_PASSWORD:-YourStrong@Passw0rd}"
      SQLSERVER_PASSWORD_FALLBACK: "${SQLSERVER_PASSWORD_FALLBACK:-YourStrong@Passw0rd}"
      SQLSERVER_DB: "${SQLSERVER_DB:-fleetcore}"

      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      REDIS_TTL_SECONDS: "${REDIS_TTL_SECONDS:-120}"
      REDIS_LOCK_TTL: "${REDIS_LOCK_TTL:-30}"

      JWT_SECRET: "${JWT_SECRET:-fleetcore_dev_secret_change_me}"
      JWT_EXPIRES_IN: "${JWT_EXPIRES_IN:-3600s}"
      AUTH_SESSION_TTL_SECONDS: "${AUTH_SESSION_TTL_SECONDS:-3600}"

      MONGO_URI: "mongodb://mongo:27017/fleetcore"

      RABBITMQ_URI: "amqp://rabbitmq:5672"
      RABBITMQ_EXCHANGE: "${RABBITMQ_EXCHANGE:-fleetcore.events}"
      RABBITMQ_QUEUE: "${RABBITMQ_QUEUE:-fleetcore.vehicles}"
      RABBITMQ_AUDIT_QUEUE: "${RABBITMQ_AUDIT_QUEUE:-fleetcore.audit}"
      RABBITMQ_RETRY_QUEUE: "${RABBITMQ_RETRY_QUEUE:-fleetcore.retry}"
      RABBITMQ_DLQ: "${RABBITMQ_DLQ:-fleetcore.dead-letter}"
      RABBITMQ_CONNECT_TIMEOUT_MS: "${RABBITMQ_CONNECT_TIMEOUT_MS:-15000}"
      RABBITMQ_RECONNECT_SECONDS: "${RABBITMQ_RECONNECT_SECONDS:-5}"
      RABBITMQ_HEARTBEAT_SECONDS: "${RABBITMQ_HEARTBEAT_SECONDS:-30}"

      WORKER_CONCURRENCY: "${WORKER_CONCURRENCY:-2}"

      RATE_LIMIT_ENABLED: "${RATE_LIMIT_ENABLED:-true}"
      RATE_LIMIT_WINDOW_SECONDS: "${RATE_LIMIT_WINDOW_SECONDS:-60}"
      RATE_LIMIT_MAX_REQUESTS: "${RATE_LIMIT_MAX_REQUESTS:-100}"
      RATE_LIMIT_AUTH_MAX_REQUESTS: "${RATE_LIMIT_AUTH_MAX_REQUESTS:-10}"
      RATE_LIMIT_AUTH_WINDOW_SECONDS: "${RATE_LIMIT_AUTH_WINDOW_SECONDS:-60}"

      RETRY_MAX_ATTEMPTS: "${RETRY_MAX_ATTEMPTS:-5}"
      RETRY_INITIAL_DELAY: "${RETRY_INITIAL_DELAY:-1000}"

      ADMIN_NICKNAME: "${ADMIN_NICKNAME:-aivacol}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-aivacol@fleetcore.local}"
      ADMIN_NAME: "${ADMIN_NAME:-Aivacol Admin}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-aivacol123!}"
    ports:
      - "${HTTP_PORT:-3000}:3000"
    depends_on:
      sqlserver:
        condition: service_healthy
      sqlserver-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - fleetnet

  # Consumidor dedicado da fila de auditoria (audit.queue): le os eventos
  # publicados no RabbitMQ e persiste em MongoDB (audit_logs/audit_events).
  # Usa a mesma imagem do backend, mas com o entrypoint do worker.
  audit-worker:
    build:
      context: ./backend
    container_name: fleetcore-audit-worker
    command: ["node", "dist/src/apps/audit-worker/main.js"]
    environment:
      NODE_ENV: "production"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      REDIS_TTL_SECONDS: "${REDIS_TTL_SECONDS:-120}"
      REDIS_LOCK_TTL: "${REDIS_LOCK_TTL:-30}"
      SQLSERVER_HOST: "sqlserver"
      SQLSERVER_PORT: "1433"
      SQLSERVER_USER: "${SQLSERVER_USER:-sa}"
      SQLSERVER_PASSWORD: "${SQLSERVER_PASSWORD:-YourStrong@Passw0rd}"
      SQLSERVER_PASSWORD_FALLBACK: "${SQLSERVER_PASSWORD_FALLBACK:-YourStrong@Passw0rd}"
      SQLSERVER_DB: "${SQLSERVER_DB:-fleetcore}"
      JWT_SECRET: "${JWT_SECRET:-fleetcore_dev_secret_change_me}"
      JWT_EXPIRES_IN: "${JWT_EXPIRES_IN:-3600s}"
      MONGO_URI: "mongodb://mongo:27017/fleetcore"
      RABBITMQ_URI: "amqp://rabbitmq:5672"
      RABBITMQ_EXCHANGE: "${RABBITMQ_EXCHANGE:-fleetcore.events}"
      RABBITMQ_QUEUE: "${RABBITMQ_QUEUE:-fleetcore.vehicles}"
      RABBITMQ_AUDIT_QUEUE: "${RABBITMQ_AUDIT_QUEUE:-fleetcore.audit}"
      RABBITMQ_RETRY_QUEUE: "${RABBITMQ_RETRY_QUEUE:-fleetcore.retry}"
      RABBITMQ_DLQ: "${RABBITMQ_DLQ:-fleetcore.dead-letter}"
      RABBITMQ_CONNECT_TIMEOUT_MS: "${RABBITMQ_CONNECT_TIMEOUT_MS:-15000}"
      RABBITMQ_RECONNECT_SECONDS: "${RABBITMQ_RECONNECT_SECONDS:-5}"
      RABBITMQ_HEARTBEAT_SECONDS: "${RABBITMQ_HEARTBEAT_SECONDS:-30}"
      WORKER_CONCURRENCY: "${WORKER_CONCURRENCY:-2}"
    depends_on:
      sqlserver:
        condition: service_healthy
      sqlserver-init:
        condition: service_completed_successfully
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fleetnet

  frontend:
    build:
      context: ./frontend
    container_name: fleetcore-frontend
    environment:
      NODE_ENV: "production"
      NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost:3000/api}"
      NEXT_PUBLIC_APP_NAME: "${NEXT_PUBLIC_APP_NAME:-Fleetcore Web}"
      NEXT_PUBLIC_CACHE_TTL_SECONDS: "${REDIS_TTL_SECONDS:-120}"
    ports:
      - "${FRONTEND_PORT:-3001}:3000"
    depends_on:
      backend:
        condition: service_started
    networks:
      - fleetnet

networks:
  fleetnet:
    driver: bridge

volumes:
  sqlserver_data:
  redis_data:
  mongo_data:
  rabbitmq_data:
