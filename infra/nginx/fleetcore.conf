server {
    listen 80;
    server_name fleetcore.example.com;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name fleetcore.example.com;

    ssl_certificate /etc/letsencrypt/live/fleetcore.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fleetcore.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
    ssl_session_cache shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header Referrer-Policy no-referrer;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()";

    access_log /var/log/nginx/fleetcore.access.log;
    error_log /var/log/nginx/fleetcore.error.log warn;

    location /api/ {
        proxy_pass http://api:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header X-Correlation-Id $request_id;
    }

    location /docs {
        proxy_pass http://api:3000/docs;
        proxy_set_header Host $host;
    }

    location /docs-pt {
        proxy_pass http://api:3000/docs-pt;
        proxy_set_header Host $host;
    }
}
